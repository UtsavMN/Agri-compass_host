# =============================================================================
# CLERK AUTHENTICATION (OAuth2 Resource Server)
# =============================================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://delicate-moth-5.clerk.accounts.dev

# =============================================================================
# SMTP / EMAIL CONFIGURATION (Gmail)
# =============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:your-email@gmail.com}
spring.mail.password=${SMTP_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================================================
# FILE UPLOAD (Multipart)
# =============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =============================================================================
# AWS S3 (for file storage - optional, can use local disk for development)
# =============================================================================
aws.s3.bucket-name=your-s3-bucket-name
aws.s3.region=ap-south-1
# Set AWS credentials via environment variables: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY

# =============================================================================
# CORS (Allow your Vercel frontend)
# =============================================================================
cors.allowed-origins=http://localhost:5173,https://your-app.vercel.app

# =============================================================================
# LOGGING
# =============================================================================
logging.level.com.agricompass=DEBUG
logging.level.org.springframework.security=DEBUG

# =============================================================================
# GEMINI AI SERVICE (Get from https://aistudio.google.com/)
# =============================================================================
gemini.api.keys=YOUR_GEMINI_API_KEY

# =============================================================================
# DATA.GOV.IN (Get from https://www.data.gov.in/)
# =============================================================================
datagov.api.key=YOUR_DATA_GOV_API_KEY

# =============================================================================
# OPENWEATHER (Get from https://openweathermap.org/api)
# =============================================================================
openweather.api.key=YOUR_OPENWEATHER_API_KEY
